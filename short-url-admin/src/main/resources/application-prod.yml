# --- Production 환경 설정 ---
# DataSource 는 외부 Tomcat 이 context.xml 의 <Resource> 로 주입한다.
# Tomcat 측 예시:
#   <Resource name="jdbc/shortUrlDS" auth="Container" type="javax.sql.DataSource"
#             driverClassName="oracle.jdbc.OracleDriver"
#             url="jdbc:oracle:thin:@prod-db:1521/FREEPDB1"
#             username="my_user" password="..."
#             maxTotal="50" maxIdle="20" maxWaitMillis="10000"/>
spring:
  datasource:
    jndi-name: java:comp/env/jdbc/shortUrlDS
  jpa:
    hibernate:
      ddl-auto: none # !!절대!! 스키마를 자동으로 변경하지 않도록 설정
    show-sql: false # 성능을 위해 SQL 로그 비활성화
    database-platform: org.hibernate.dialect.OracleDialect

server:
  port: 8080

logging:
  level:
    root: INFO # 불필요한 로그를 줄이고 INFO 레벨 이상만 기록

base-url: https://your-domain.com/

short-url:
  redirect:
    public-url: https://your-domain.com/r/
