<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Redirection Error</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: #f8fafc;
            color: #1e293b;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            text-align: center;
        }
        h1 {
            color: #e11d48;
            margin-top: 0;
        }
        p {
            color: #64748b;
            line-height: 1.6;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>이동 실패</h1>
    <p>{{reason}}</p>
    <p>요청하신 URL이 존재하지 않거나 만료되었습니다.</p>
</div>
</body>
</html>
