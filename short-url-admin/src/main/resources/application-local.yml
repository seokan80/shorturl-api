# --- Local 환경 설정 ---
# 파일 기반 H2 로 재기동 간 데이터 유지. build/ 하위에 저장되므로 .gitignore 로 자동 제외.
spring:
  datasource:
    driver-class-name: org.h2.Driver
    # file 모드 + AUTO_SERVER 로 devtools restart 시 lock 충돌 회피, Oracle 호환 모드 유지
    url: jdbc:h2:file:./build/h2db/shorturl;MODE=Oracle;AUTO_SERVER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update   # 파일 기반이므로 스키마를 누적 반영
    show-sql: true       # 로컬 디버깅용 SQL 로그
    database-platform: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080

short-url:
  redirect:
    public-url: http://localhost:8080/r/

jasypt:
  encryptor:
    password: shortUrlApi # 로컬 개발용 마스터 키

logging:
  level:
    root: INFO
    '[com.nh.shorturl]': DEBUG
