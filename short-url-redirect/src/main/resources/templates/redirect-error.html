<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이동 실패</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: #f8fafc;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, .1);
            max-width: 400px;
            text-align: center;
        }
        h1 { color: #e11d48; }
        p { color: #64748b; line-height: 1.6; }
        small { word-break: break-all; }
    </style>
</head>
<body>
    <div class="card">
        <h1>이동 실패</h1>
        <p>요청하신 URL이 존재하지 않거나 만료되었습니다.</p>
        <p><small>{{reason}}</small></p>
    </div>
</body>
</html>
